<!DOCTYPE HTML>
<html>
<head>
  <meta charset="UTF-8">
  <title>The Toroidal Universe — AR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1.3.0/dist/aframe-master.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Georgia', serif;
      background: #000;
    }

    /* ── Info panel ── */
    .info-panel {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: #e8d5a0;
      padding: 6px 18px;
      border-radius: 20px;
      z-index: 999;
      font-size: 13px;
      letter-spacing: 0.08em;
      border: 1px solid rgba(232,213,160,0.3);
      white-space: nowrap;
      transition: background 0.4s;
    }
    .info-panel.found  { background: rgba(0,80,40,0.65);  border-color: rgba(100,255,150,0.4); color: #90ffb8; }
    .info-panel.lost   { background: rgba(80,0,0,0.65);   border-color: rgba(255,100,80,0.4);  color: #ffaa90; }

    /* ── Control panel ── */
    .control-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(8,6,20,0.75);
      color: #e8d5a0;
      padding: 10px 6px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 999;
      border-top: 1px solid rgba(232,213,160,0.15);
      backdrop-filter: blur(6px);
    }
    .control-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .btn {
      background: rgba(232,213,160,0.08);
      color: #e8d5a0;
      border: 1px solid rgba(232,213,160,0.35);
      border-radius: 6px;
      padding: 7px 11px;
      font-size: 12px;
      font-family: 'Georgia', serif;
      letter-spacing: 0.05em;
      cursor: pointer;
      min-width: 76px;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .btn:hover  { background: rgba(232,213,160,0.18); }
    .btn.active { background: rgba(200,120,40,0.55); border-color: #c87830; color: #ffe8b0; }

    @media (max-width: 480px) {
      .btn { padding: 6px 8px; min-width: 66px; font-size: 11px; }
    }
  </style>

  <script>
  // ─────────────────────────────────────────────────────────────────
  //  COMPONENT: toroidal-surface
  //  Generates the "Toroidal Universe" shape:
  //    a torus-like surface where z oscillates sinusoidally,
  //    creating the pinched double-lobe visible in the marker image.
  // ─────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function() {

    AFRAME.registerComponent('toroidal-surface', {
      schema: {
        R:          { type: 'number',  default: 0.55  }, // major radius
        r:          { type: 'number',  default: 0.28  }, // minor radius (tube)
        amplitude:  { type: 'number',  default: 0.18  }, // z-pinch amplitude
        frequency:  { type: 'number',  default: 2     }, // pinch cycles around φ
        uSegs:      { type: 'number',  default: 80    }, // φ segments
        vSegs:      { type: 'number',  default: 48    }, // θ segments
        color:      { type: 'color',   default: '#ff7a30' },
        wireframe:  { type: 'boolean', default: false }
      },

      init()  { this.build(); },

      update(old) {
        const d = this.data;
        const keys = ['R','r','amplitude','frequency','uSegs','vSegs'];
        if (keys.some(k => old[k] !== d[k])) {
          this.el.removeObject3D('mesh');
          this.build();
        } else if (this.mesh) {
          if (old.color     !== d.color)     this.mesh.material.color.set(d.color);
          if (old.wireframe !== d.wireframe) this.mesh.material.wireframe = d.wireframe;
        }
      },

      build() {
        const { R, r, amplitude, frequency, uSegs, vSegs } = this.data;
        const geo = new THREE.BufferGeometry();
        const verts = [], idx = [], cols = vSegs + 1;

        for (let ui = 0; ui <= uSegs; ui++) {
          const phi = (ui / uSegs) * 2 * Math.PI;          // around torus
          const pinch = 1 - amplitude * Math.abs(Math.cos(frequency * phi));

          for (let vi = 0; vi <= vSegs; vi++) {
            const theta = (vi / vSegs) * 2 * Math.PI;       // around tube

            // Standard torus with radial pinch on minor radius
            const rr = r * pinch;
            const x = (R + rr * Math.cos(theta)) * Math.cos(phi);
            const y = (R + rr * Math.cos(theta)) * Math.sin(phi);
            const z = rr * Math.sin(theta);

            verts.push(x, y, z);
          }
        }

        for (let ui = 0; ui < uSegs; ui++) {
          for (let vi = 0; vi < vSegs; vi++) {
            const a = ui * cols + vi;
            const b = a + 1;
            const c = a + cols;
            const d2 = c + 1;
            idx.push(a, b, c);
            idx.push(b, d2, c);
          }
        }

        geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
        geo.setIndex(idx);
        geo.computeVertexNormals();

        const mat = new THREE.MeshStandardMaterial({
          color:     this.data.color,
          side:      THREE.DoubleSide,
          wireframe: this.data.wireframe,
          metalness: 0.3,
          roughness: 0.5
        });

        this.mesh = new THREE.Mesh(geo, mat);
        this.el.setObject3D('mesh', this.mesh);
      },

      remove() { if (this.mesh) this.el.removeObject3D('mesh'); }
    });

    // ── multi-axis-rotation (unchanged logic) ──
    AFRAME.registerComponent('multi-axis-rotation', {
      schema: {
        enabled: { type: 'boolean', default: true },
        speed:   { type: 'number',  default: 0.4  },
        mode:    { type: 'string',  default: 'y'  }
      },
      init() { this.rot = { x:0, y:0, z:0 }; },
      tick(time, dt) {
        if (!this.data.enabled) return;
        const s = this.data.speed, d = dt / 1000, m = this.data.mode;
        if (m.includes('x')) this.rot.x += d * s;
        if (m.includes('y')) this.rot.y += d * s;
        if (m.includes('z')) this.rot.z += d * s;
        this.el.object3D.rotation.set(this.rot.x, this.rot.y, this.rot.z);
      }
    });

  }); // end DOMContentLoaded
  </script>
</head>

<body>

  <!-- ── Status ── -->
  <div class="info-panel" id="info">🔭 Шукаю маркер…</div>

  <!-- ── Controls ── -->
  <div class="control-panel">
    <div class="control-row">
      <button class="btn" id="btn-wireframe">Каркас</button>
      <button class="btn" id="btn-color">Колір</button>
      <button class="btn" id="btn-axis">Вісь: Y</button>
    </div>
    <div class="control-row">
      <button class="btn" id="btn-size">Розмір</button>
      <button class="btn active" id="btn-speed">Швид: 0.4</button>
      <button class="btn" id="btn-detail">Деталі: M</button>
    </div>
  </div>

  <!-- ── A-Frame scene ── -->
  <a-scene embedded vr-mode-ui="enabled: false;"
    arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">

    <!-- Lights -->
    <a-light type="ambient" color="#ffffff" intensity="0.5"></a-light>
    <a-light type="directional" position="1 2 1" intensity="1.0" color="#ffe8c0"></a-light>
    <a-light type="point" position="-1 1 -1" intensity="0.4" color="#8080ff"></a-light>

    <a-marker type="pattern" preset="custom"
              url="./markers/pattern-The-Toroidal-Universe.patt"
              id="marker">

      <!-- Toroidal surface -->
      <a-entity id="torus"
        position="0 0.4 0"
        scale="0.9 0.9 0.9"
        toroidal-surface="R:0.55; r:0.28; amplitude:0.18; frequency:2; uSegs:80; vSegs:48; color:#ff7a30; wireframe:false"
        multi-axis-rotation="enabled:true; speed:0.4; mode:y">
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <!-- ── App logic ── -->
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    const marker   = document.getElementById('marker');
    const torus    = document.getElementById('torus');
    const info     = document.getElementById('info');

    // ── Marker events ──
    marker.addEventListener('markerFound', () => {
      info.textContent = '✨ Маркер знайдено!';
      info.className = 'info-panel found';
    });
    marker.addEventListener('markerLost', () => {
      info.textContent = '🔭 Маркер втрачено…';
      info.className = 'info-panel lost';
    });

    // ── State ──
    let wireframe = false;
    let colorIdx  = 0;
    let modeIdx   = 0;
    let sizeIdx   = 0;
    let speedIdx  = 0;
    let detailIdx = 0;

    const colors = [
      { label: 'Вогонь',  surface: '#ff7a30' },
      { label: 'Лазур',   surface: '#30c8ff' },
      { label: 'Нефрит',  surface: '#40ff90' },
      { label: 'Аметист', surface: '#b060ff' },
      { label: 'Золото',  surface: '#ffd060' },
      { label: 'Рожевий', surface: '#ff60a0' }
    ];

    const modes = ['y','x','z','xy','xz','yz','xyz'];

    const sizes = [
      { s: '0.9 0.9 0.9', label: 'M' },
      { s: '0.6 0.6 0.6', label: 'S' },
      { s: '1.2 1.2 1.2', label: 'L' },
      { s: '1.5 1.5 1.5', label: 'XL'}
    ];

    const speeds = [0.4, 0.1, 0.7, 1.2, 0.0];

    const details = [
      { label: 'M',  uSegs: 80,  vSegs: 48 },
      { label: 'Lo', uSegs: 30,  vSegs: 20 },
      { label: 'Hi', uSegs: 120, vSegs: 72 }
    ];

    // ── Wireframe ──
    document.getElementById('btn-wireframe').addEventListener('click', function() {
      wireframe = !wireframe;
      torus.setAttribute('toroidal-surface', 'wireframe', wireframe);
      this.classList.toggle('active', wireframe);
    });

    // ── Color ──
    document.getElementById('btn-color').addEventListener('click', function() {
      colorIdx = (colorIdx + 1) % colors.length;
      torus.setAttribute('toroidal-surface', 'color', colors[colorIdx].surface);
      this.textContent = colors[colorIdx].label;
    });

    // ── Axis ──
    document.getElementById('btn-axis').addEventListener('click', function() {
      modeIdx = (modeIdx + 1) % modes.length;
      torus.setAttribute('multi-axis-rotation', 'mode', modes[modeIdx]);
      this.textContent = 'Вісь: ' + modes[modeIdx].toUpperCase();
    });

    // ── Size ──
    document.getElementById('btn-size').addEventListener('click', function() {
      sizeIdx = (sizeIdx + 1) % sizes.length;
      torus.setAttribute('scale', sizes[sizeIdx].s);
      this.textContent = 'Розмір: ' + sizes[sizeIdx].label;
    });

    // ── Speed (single click cycle, double-click pause) ──
    const btnSpeed = document.getElementById('btn-speed');
    btnSpeed.addEventListener('click', function() {
      speedIdx = (speedIdx + 1) % speeds.length;
      const sp = speeds[speedIdx];
      if (sp === 0.0) {
        torus.setAttribute('multi-axis-rotation', 'enabled', false);
        this.textContent = 'Стоп';
        this.classList.remove('active');
      } else {
        torus.setAttribute('multi-axis-rotation', 'enabled', true);
        torus.setAttribute('multi-axis-rotation', 'speed', sp);
        this.textContent = 'Швид: ' + sp.toFixed(1);
        this.classList.add('active');
      }
    });

    // ── Detail ──
    document.getElementById('btn-detail').addEventListener('click', function() {
      detailIdx = (detailIdx + 1) % details.length;
      const d = details[detailIdx];
      torus.setAttribute('toroidal-surface', 'uSegs', d.uSegs);
      torus.setAttribute('toroidal-surface', 'vSegs', d.vSegs);
      this.textContent = 'Деталі: ' + d.label;
    });
  });
  </script>

</body>
</html>
