<!DOCTYPE HTML>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gross Topology Mesh — AR Surface</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <!-- FIX 1: Segoe UI is a system font, not on Google Fonts — removed broken import -->
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1.3.0/dist/aframe-master.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="components.js"></script>
</head>

<body>

  <!-- TOP STRIP -->
  <div id="top-strip">
    <div class="title-block">
      <div class="big-title">3D Gross Topology Mesh</div>
      <div class="formula-tag">Z = <span>S³/3 − T²/2</span></div>
    </div>
    <div id="state-pill">
      <div class="tui-dot" id="state-dot"></div>
      <span id="state-text">Scanning</span>
    </div>
  </div>

  <!-- SIDE TICKER -->
  <div id="side-ticker">
    <span class="live">Live</span>
    <span>AR</span>
    <span>3D</span>
    <span>Mesh</span>
  </div>

  <!-- CORNER BRACKETS -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>

  <!-- AR SCENE -->
  <div id="ar-wrap">
    <a-scene embedded vr-mode-ui="enabled: false;"
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
      style="width:100%;height:100%;">

      <a-light type="ambient"     color="#ffffff"  intensity="0.5"></a-light>
      <a-light type="directional" position="2 3 1" color="#FFB6C1" intensity="1.0"></a-light>
      <a-light type="point"       position="-1 1 -2" color="#ADD8E6" intensity="0.45"></a-light>

      <!-- FIX 2: Replaced hardcoded Windows absolute path with relative filename -->
      <a-marker type="pattern" preset="custom"
                url="pattern-Gross-TopologyMesh.patt"
                id="marker">

        <a-entity id="surf"
          position="0 0.15 0"
          scale="0.55 0.55 0.55"
          shoe-surface="sMin:-1.4; sMax:1.4; tMin:-1.0; tMax:1.0; sSegs:60; tSegs:60; zScale:0.6; color:#FF69B4; wireframe:false"
          spin-axis="active:true; rate:0.35; axes:y">
        </a-entity>

      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </div>

  <!-- BOTTOM PANEL -->
  <div id="bottom-panel">
    <div id="btn-grid">

      <div class="ctrl-cell">
        <div class="ctrl-label">Render</div>
        <button class="ctrl-btn" id="btn-wire">Wireframe</button>
      </div>

      <div class="ctrl-cell">
        <div class="ctrl-label">Palette</div>
        <button class="ctrl-btn" id="btn-color">Lavender Pink</button>
      </div>

      <div class="ctrl-cell">
        <div class="ctrl-label">Rotation</div>
        <button class="ctrl-btn on" id="btn-axes">Axis — Y</button>
      </div>

      <div class="ctrl-cell">
        <div class="ctrl-label">Scale</div>
        <button class="ctrl-btn" id="btn-size">Size — M</button>
      </div>

      <div class="ctrl-cell">
        <div class="ctrl-label">Velocity</div>
        <button class="ctrl-btn on" id="btn-speed">Rate 0.35</button>
      </div>

      <div class="ctrl-cell">
        <div class="ctrl-label">Density</div>
        <button class="ctrl-btn" id="btn-detail">Mesh — M</button>
      </div>

    </div>

    <div id="readout">
      <div class="readout-row">
        <span class="readout-key">Segs</span>
        <span class="readout-val hi" id="ro-segs">60</span>
      </div>
      <div class="readout-row">
        <span class="readout-key">Rate</span>
        <span class="readout-val" id="ro-rate">0.35</span>
      </div>
      <div class="readout-row">
        <span class="readout-key">Axis</span>
        <span class="readout-val" id="ro-axis">Y</span>
      </div>
      <div class="readout-row">
        <span class="readout-key">Scale</span>
        <span class="readout-val" id="ro-scale">0.55</span>
      </div>
      <div class="readout-row">
        <span class="readout-key">Mode</span>
        <span class="readout-val" id="ro-mode">Solid</span>
      </div>
    </div>
  </div>

  <!-- FIX 3: All button logic + marker state events (was completely missing) -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {

      const surf   = document.getElementById('surf');
      const marker = document.getElementById('marker');
      const dot    = document.getElementById('state-dot');
      const txt    = document.getElementById('state-text');

      /* ── helpers ── */
      function getSurface()   { return surf.components['shoe-surface']; }
      function getSpinner()   { return surf.components['spin-axis']; }

      function setSurface(patch) {
        const cur = surf.getAttribute('shoe-surface');
        surf.setAttribute('shoe-surface', Object.assign({}, cur, patch));
      }
      function setSpinner(patch) {
        const cur = surf.getAttribute('spin-axis');
        surf.setAttribute('spin-axis', Object.assign({}, cur, patch));
      }

      /* ── marker state pill ── */
      marker.addEventListener('markerFound', function () {
        dot.className = 'tui-dot connected';
        txt.textContent = 'Tracking';
      });
      marker.addEventListener('markerLost', function () {
        dot.className = 'tui-dot';
        txt.textContent = 'Scanning';
      });

      /* ── Wireframe toggle ── */
      let wireframe = false;
      document.getElementById('btn-wire').addEventListener('click', function () {
        wireframe = !wireframe;
        setSurface({ wireframe });
        this.textContent = wireframe ? 'Solid' : 'Wireframe';
        this.classList.toggle('on', wireframe);
        document.getElementById('ro-mode').textContent = wireframe ? 'Wire' : 'Solid';
      });

      /* ── Palette cycle ── */
      const palettes = [
        { label: 'Lavender Pink', color: '#FF69B4' },
        { label: 'Sky Blue',      color: '#87CEEB' },
        { label: 'Mint Green',    color: '#98FF98' },
        { label: 'Gold',          color: '#FFD700' },
        { label: 'Violet',        color: '#7B68EE' },
        { label: 'Coral',         color: '#FF6B6B' },
      ];
      let paletteIdx = 0;
      document.getElementById('btn-color').addEventListener('click', function () {
        paletteIdx = (paletteIdx + 1) % palettes.length;
        const p = palettes[paletteIdx];
        setSurface({ color: p.color });
        this.textContent = p.label;
      });

      /* ── Rotation axis cycle ── */
      const axisCycles = ['y', 'x', 'z', 'xy', 'yz', 'xyz'];
      const axisLabels = ['Y', 'X', 'Z', 'X+Y', 'Y+Z', 'All'];
      let axisIdx = 0;
      document.getElementById('btn-axes').addEventListener('click', function () {
        axisIdx = (axisIdx + 1) % axisCycles.length;
        setSpinner({ axes: axisCycles[axisIdx] });
        this.textContent = 'Axis — ' + axisLabels[axisIdx];
        document.getElementById('ro-axis').textContent = axisLabels[axisIdx];
      });

      /* ── Scale cycle ── */
      const scales      = [0.35, 0.55, 0.75, 1.0];
      const scaleLabels = ['S', 'M', 'L', 'XL'];
      let scaleIdx = 1;
      document.getElementById('btn-size').addEventListener('click', function () {
        scaleIdx = (scaleIdx + 1) % scales.length;
        const s = scales[scaleIdx];
        surf.setAttribute('scale', `${s} ${s} ${s}`);
        this.textContent = 'Size — ' + scaleLabels[scaleIdx];
        document.getElementById('ro-scale').textContent = s.toFixed(2);
      });

      /* ── Spin rate cycle ── */
      const rates = [0, 0.15, 0.35, 0.65, 1.2];
      const rateLabels = ['0.00', '0.15', '0.35', '0.65', '1.20'];
      let rateIdx = 2;
      document.getElementById('btn-speed').addEventListener('click', function () {
        rateIdx = (rateIdx + 1) % rates.length;
        const r = rates[rateIdx];
        setSpinner({ rate: r, active: r > 0 });
        this.textContent = 'Rate ' + rateLabels[rateIdx];
        this.classList.toggle('on', r > 0);
        document.getElementById('ro-rate').textContent = rateLabels[rateIdx];
      });

      /* ── Mesh density cycle ── */
      const segs      = [20, 40, 60, 90, 120];
      const segLabels = ['XS', 'S', 'M', 'L', 'XL'];
      let segIdx = 2;
      document.getElementById('btn-detail').addEventListener('click', function () {
        segIdx = (segIdx + 1) % segs.length;
        const n = segs[segIdx];
        setSurface({ sSegs: n, tSegs: n });
        this.textContent = 'Mesh — ' + segLabels[segIdx];
        this.classList.toggle('on', segIdx >= 3);
        document.getElementById('ro-segs').textContent = n;
      });

    });
  </script>

</body>
</html>
