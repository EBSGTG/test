<!DOCTYPE HTML>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gross Topology Mesh — AR Surface</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1.3.0/dist/aframe-master.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:       #FF69B4;
      --pink-deep:  #FF1493;
      --lavender:   #E6E6FA;
      --violet:     #7B68EE;
      --indigo:     #4B0082;
      --sky:        #ADD8E6;
      --bg:         #F8F8FF;
      --white:      #FFFFFF;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--indigo);
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    /* ── TOP STRIP ── */
    #top-strip {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: linear-gradient(135deg, #FFB6C1 0%, #E6E6FA 100%);
      border-bottom: 3px solid var(--sky);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 1000;
      pointer-events: none;
      box-shadow: 0 2px 10px rgba(123,104,238,0.15);
    }

    .title-block {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .big-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--pink);
      text-shadow: 1px 1px 2px rgba(255,105,180,0.3);
      letter-spacing: 0.04em;
    }

    .formula-tag {
      font-size: 11px;
      color: var(--violet);
      font-style: italic;
      opacity: 0.85;
      border-left: 2px solid var(--sky);
      padding-left: 10px;
    }
    .formula-tag span { color: var(--indigo); font-weight: 600; }

    /* status badge – mirrors tui-status-badge */
    #state-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--white);
      border: 1px solid var(--lavender);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      color: var(--violet);
      box-shadow: 0 2px 6px rgba(123,104,238,0.1);
      pointer-events: none;
    }

    .tui-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--sky);
      transition: background 0.3s, box-shadow 0.3s;
      flex-shrink: 0;
    }
    .tui-dot.connected  { background: #22c55e; box-shadow: 0 0 5px #22c55e88; }
    .tui-dot.error      { background: #ef4444; box-shadow: 0 0 5px #ef444488; }

    /* ── SIDE TICKER ── */
    #side-ticker {
      position: absolute;
      top: 56px; left: 0; bottom: 130px;
      width: 36px;
      background: var(--lavender);
      border-right: 2px dashed var(--sky);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 999;
      pointer-events: none;
    }

    #side-ticker span {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: var(--violet);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      text-transform: uppercase;
    }
    #side-ticker .live {
      color: var(--pink);
      animation: blink 2.2s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.25;} }

    /* corner brackets – matching header accent color */
    .corner {
      position: absolute;
      width: 20px; height: 20px;
      z-index: 1001;
      pointer-events: none;
    }
    .corner.tl { top: 60px; left: 40px; border-top: 2px solid var(--pink); border-left: 2px solid var(--pink); }
    .corner.tr { top: 60px; right: 4px;  border-top: 2px solid var(--pink); border-right: 2px solid var(--pink); }

    /* ── AR SCENE AREA ── */
    #ar-wrap {
      position: absolute;
      top: 56px; left: 36px; right: 0; bottom: 130px;
    }

    /* ── BOTTOM PANEL ── */
    #bottom-panel {
      position: absolute;
      bottom: 0; left: 36px; right: 0;
      height: 130px;
      background: var(--white);
      border-top: 3px solid var(--sky);
      box-shadow: 0 -4px 15px rgba(123,104,238,0.12);
      display: grid;
      grid-template-columns: 1fr auto;
    }

    #btn-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-right: 1px solid var(--lavender);
    }

    .ctrl-cell {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--lavender);
      border-bottom: 1px solid var(--lavender);
    }
    .ctrl-cell:nth-child(3n) { border-right: none; }

    .ctrl-label {
      font-size: 8px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--violet);
      padding: 5px 10px 2px;
      border-bottom: 1px solid var(--lavender);
      font-weight: 600;
    }

    .ctrl-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--indigo);
      font-family: 'Segoe UI', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 6px 10px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, color 0.15s;
      position: relative;
    }
    .ctrl-btn::after {
      content: '▶';
      position: absolute;
      right: 8px; top: 50%;
      transform: translateY(-50%);
      font-size: 7px;
      color: var(--sky);
      transition: color 0.15s;
    }
    .ctrl-btn:hover {
      background: var(--lavender);
      color: var(--pink);
    }
    .ctrl-btn:hover::after { color: var(--pink); }
    .ctrl-btn.on {
      color: var(--pink);
      background: rgba(255,105,180,0.07);
    }
    .ctrl-btn.on::after { color: var(--pink); }

    /* ── READOUT – mirrors value-badge ── */
    #readout {
      width: 110px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      justify-content: center;
      background: #F0F8FF;
    }
    .readout-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .readout-key {
      font-size: 8px;
      color: var(--violet);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .readout-val {
      font-size: 11px;
      color: var(--indigo);
      font-variant-numeric: tabular-nums;
      background: var(--lavender);
      color: var(--violet);
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid var(--sky);
      font-weight: 600;
    }
    .readout-val.hi { background: rgba(255,105,180,0.12); color: var(--pink); border-color: rgba(255,105,180,0.4); }

    /* ── MOBILE ADJUSTMENTS ── */
    @media (max-width: 600px) {
      .big-title { font-size: 15px; }
      .formula-tag { display: none; }
      #side-ticker { width: 28px; }
      #side-ticker span { font-size: 8px; }
      #bottom-panel { left: 28px; height: 140px; }
      #ar-wrap { left: 28px; bottom: 140px; }
      .corner.tl { left: 32px; }
      #readout { width: 90px; }
      .ctrl-btn { font-size: 10px; }
    }
  </style>

  <script>
  document.addEventListener('DOMContentLoaded', function () {

    AFRAME.registerComponent('shoe-surface', {
      schema: {
        sMin:      { type: 'number',  default: -1.4  },
        sMax:      { type: 'number',  default:  1.4  },
        tMin:      { type: 'number',  default: -1.0  },
        tMax:      { type: 'number',  default:  1.0  },
        sSegs:     { type: 'number',  default: 60    },
        tSegs:     { type: 'number',  default: 60    },
        zScale:    { type: 'number',  default: 0.6   },
        color:     { type: 'color',   default: '#FF69B4' },
        wireframe: { type: 'boolean', default: false }
      },
      init()  { this.build(); },
      update(old) {
        const geo = ['sMin','sMax','tMin','tMax','sSegs','tSegs','zScale'];
        if (geo.some(k => old[k] !== this.data[k])) {
          this.el.removeObject3D('mesh'); this.build();
        } else if (this.mesh) {
          if (old.color     !== this.data.color)     this.mesh.material.color.set(this.data.color);
          if (old.wireframe !== this.data.wireframe) this.mesh.material.wireframe = this.data.wireframe;
        }
      },
      vertex(s, t, zs) {
        const z = (Math.pow(s, 3) / 3 - Math.pow(t, 2) / 2) * zs;
        return [s, z, t];
      },
      build() {
        const { sMin, sMax, tMin, tMax, sSegs, tSegs, zScale, color, wireframe } = this.data;
        const pos = [], idx = [], cols = tSegs + 1;
        for (let si = 0; si <= sSegs; si++) {
          const s = sMin + (si / sSegs) * (sMax - sMin);
          for (let ti = 0; ti <= tSegs; ti++) {
            const t = tMin + (ti / tSegs) * (tMax - tMin);
            pos.push(...this.vertex(s, t, zScale));
          }
        }
        for (let si = 0; si < sSegs; si++) {
          for (let ti = 0; ti < tSegs; ti++) {
            const a = si*cols+ti, b=a+1, c=(si+1)*cols+ti, d=c+1;
            idx.push(a,b,c, b,d,c);
          }
        }
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        geo.setIndex(idx);
        geo.computeVertexNormals();
        const mat = new THREE.MeshStandardMaterial({
          color, side: THREE.DoubleSide, wireframe, metalness: 0.4, roughness: 0.4
        });
        this.mesh = new THREE.Mesh(geo, mat);
        this.el.setObject3D('mesh', this.mesh);
      },
      remove() { if (this.mesh) this.el.removeObject3D('mesh'); }
    });

    AFRAME.registerComponent('spin-axis', {
      schema: {
        active: { type: 'boolean', default: true },
        rate:   { type: 'number',  default: 0.35 },
        axes:   { type: 'string',  default: 'y'  }
      },
      init() { this.ang = { x:0, y:0, z:0 }; },
      tick(_, dt) {
        if (!this.data.active) return;
        const d = (dt / 1000) * this.data.rate;
        const ax = this.data.axes;
        if (ax.includes('x')) this.ang.x += d;
        if (ax.includes('y')) this.ang.y += d;
        if (ax.includes('z')) this.ang.z += d;
        this.el.object3D.rotation.set(this.ang.x, this.ang.y, this.ang.z);
      }
    });

  });
  </script>
</head>

<body>

  <!-- TOP STRIP -->
  <div id="top-strip">
    <div class="title-block">
      <div class="big-title">3D Gross Topology Mesh</div>
      <div class="formula-tag">Z = <span>S³/3 − T²/2</span></div>
    </div>
    <div id="state-pill">
      <div class="tui-dot" id="state-dot"></div>
      <span id="state-text">Scanning</span>
    </div>
  </div>

  <!-- SIDE TICKER -->
  <div id="side-ticker">
    <span class="live">Live</span>
    <span>AR</span>
    <span>3D</span>
    <span>Mesh</span>
  </div>

  <!-- CORNER BRACKETS -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>

  <!-- AR SCENE -->
  <div id="ar-wrap">
    <a-scene embedded vr-mode-ui="enabled: false;"
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
      style="width:100%;height:100%;">

      <a-light type="ambient"     color="#ffffff"  intensity="0.5"></a-light>
      <a-light type="directional" position="2 3 1" color="#FFB6C1" intensity="1.0"></a-light>
      <a-light type="point"       position="-1 1 -2" color="#ADD8E6" intensity="0.45"></a-light>

      <a-marker type="pattern" preset="custom"
                url="./markers/pattern-Gross-TopologyMesh.patt"
                id="marker">

        <a-entity id="surf"
          position="0 0.15 0"
          scale="0.55 0.55 0.55"
          shoe-surface="sMin:-1.4; sMax:1.4; tMin:-1.0; tMax:1.0; sSegs:60; tSegs:60; zScale:0.6; color:#FF69B4; wireframe:false"
          spin-axis="active:true; rate:0.35; axes:y">
        </a-entity>

      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </div>

  <!-- BOTTOM PANEL -->
  <div id="bottom-panel">
    <div id="btn-grid">

      <div class="ctrl-cell">
        <div class="ctrl-label">Render</div>
        <button class="ctrl-btn" id="btn-wire">Wireframe</button>
      </div>

      <div class="ctrl-cell">
        <div class="ctrl-label">Palette</div>
        <button class="ctrl-btn" id="btn-color">Lavender Pink</button>
      </div>

      <div class="ctrl-cell">
        <div class="ctrl-label">Rotation</div>
        <button class="ctrl-btn on" id="btn-axes">Axis — Y</button>
      </div>

      <div class="ctrl-cell">
        <div class="ctrl-label">Scale</div>
        <button class="ctrl-btn" id="btn-size">Size — M</button>
      </div>

      <div class="ctrl-cell">
        <div class="ctrl-label">Velocity</div>
        <button class="ctrl-btn on" id="btn-speed">Rate 0.35</button>
      </div>

      <div class="ctrl-cell">
        <div class="ctrl-label">Density</div>
        <button class="ctrl-btn" id="btn-detail">Mesh — M</button>
      </div>

    </div>

    <div id="readout">
      <div class="readout-row">
        <span class="readout-key">Segs</span>
        <span class="readout-val hi" id="ro-segs">60</span>
      </div>
      <div class="readout-row">
        <span class="readout-key">Rate</span>
        <span class="readout-val" id="ro-rate">0.35</span>
      </div>
      <div class="readout-row">
        <span class="readout-key">Axis</span>
        <span class="readout-val" id="ro-axis">Y</span>
      </div>
      <div class="readout-row">
        <span class="readout-key">Scale</span>
        <span class="readout-val" id="ro-scale">0.55</span>
      </div>
      <div class="readout-row">
        <span class="readout-key">Mode</span>
        <span class="readout-val" id="ro-mode">Solid</span>
      </div>
    </div>
  </div>

  <script>
  document.addEventListener('DOMContentLoaded', function () {
    const marker = document.getElementById('marker');
    const surf   = document.getElementById('surf');
    const dot    = document.getElementById('state-dot');
    const txt    = document.getElementById('state-text');

    marker.addEventListener('markerFound', () => {
      dot.className = 'tui-dot connected';
      txt.textContent = 'Locked';
    });
    marker.addEventListener('markerLost', () => {
      dot.className = 'tui-dot error';
      txt.textContent = 'Lost';
    });

    let wire=false, colorIdx=0, axIdx=0, sizeIdx=0, speedIdx=0, detailIdx=0;

    const palette = [
      { label:'Lavender Pink', hex:'#FF69B4' },
      { label:'Violet',        hex:'#7B68EE' },
      { label:'Sky Blue',      hex:'#ADD8E6' },
      { label:'Deep Pink',     hex:'#FF1493' },
      { label:'Lavender',      hex:'#9370DB' },
      { label:'Rose',          hex:'#FFB6C1' },
    ];

    const axList = [
      {k:'y',l:'Y'},{k:'x',l:'X'},{k:'z',l:'Z'},
      {k:'xy',l:'XY'},{k:'xz',l:'XZ'},{k:'yz',l:'YZ'},{k:'xyz',l:'XYZ'},
    ];

    const sizes = [
      {s:'0.55 0.55 0.55',l:'M', v:'0.55'},
      {s:'0.35 0.35 0.35',l:'S', v:'0.35'},
      {s:'0.75 0.75 0.75',l:'L', v:'0.75'},
      {s:'1.0 1.0 1.0',  l:'XL',v:'1.00'},
    ];

    const speeds = [
      {r:0.35,l:'0.35'},{r:0.10,l:'0.10'},
      {r:0.70,l:'0.70'},{r:1.20,l:'1.20'},{r:0,l:'Stop'},
    ];

    const details = [
      {segs:60,l:'M'},{segs:25,l:'Lo'},{segs:100,l:'Hi'},
    ];

    const ro = id => document.getElementById(id);

    document.getElementById('btn-wire').addEventListener('click', function () {
      wire = !wire;
      surf.setAttribute('shoe-surface','wireframe',wire);
      this.textContent = wire ? 'Solid' : 'Wireframe';
      this.classList.toggle('on', wire);
      ro('ro-mode').textContent = wire ? 'Wire' : 'Solid';
    });

    document.getElementById('btn-color').addEventListener('click', function () {
      colorIdx = (colorIdx+1) % palette.length;
      surf.setAttribute('shoe-surface','color',palette[colorIdx].hex);
      this.textContent = palette[colorIdx].label;
    });

    document.getElementById('btn-axes').addEventListener('click', function () {
      axIdx = (axIdx+1) % axList.length;
      surf.setAttribute('spin-axis','axes',axList[axIdx].k);
      this.textContent = 'Axis — '+axList[axIdx].l;
      ro('ro-axis').textContent = axList[axIdx].l;
    });

    document.getElementById('btn-size').addEventListener('click', function () {
      sizeIdx = (sizeIdx+1) % sizes.length;
      surf.setAttribute('scale',sizes[sizeIdx].s);
      this.textContent = 'Size — '+sizes[sizeIdx].l;
      ro('ro-scale').textContent = sizes[sizeIdx].v;
    });

    document.getElementById('btn-speed').addEventListener('click', function () {
      speedIdx = (speedIdx+1) % speeds.length;
      const sp = speeds[speedIdx];
      if (sp.r===0) {
        surf.setAttribute('spin-axis','active',false);
        this.classList.remove('on');
      } else {
        surf.setAttribute('spin-axis','active',true);
        surf.setAttribute('spin-axis','rate',sp.r);
        this.classList.add('on');
      }
      this.textContent = 'Rate '+sp.l;
      ro('ro-rate').textContent = sp.l;
    });

    document.getElementById('btn-detail').addEventListener('click', function () {
      detailIdx = (detailIdx+1) % details.length;
      const d = details[detailIdx];
      surf.setAttribute('shoe-surface','sSegs',d.segs);
      surf.setAttribute('shoe-surface','tSegs',d.segs);
      this.textContent = 'Mesh — '+d.l;
      ro('ro-segs').textContent = d.segs;
    });
  });
  </script>

</body>
</html>
