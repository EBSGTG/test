<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>AR – Astroidal Torus & Shoe Surface</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; background: #000; }
    #ui {
      position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
      z-index: 9999; display: flex; gap: 8px; pointer-events: all;
    }
    .btn {
      padding: 10px 20px; border: none; border-radius: 8px;
      font-size: 15px; font-weight: bold; cursor: pointer;
      box-shadow: 0 3px 10px rgba(0,0,0,0.5);
      -webkit-tap-highlight-color: transparent;
    }
    .btn.active   { background: #4cff72; color: #000; }
    .btn.inactive { background: rgba(255,255,255,0.9); color: #333; }
    #status {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: #fff;
      padding: 10px 22px; border-radius: 22px;
      font-size: 14px; z-index: 9999; pointer-events: none;
      transition: background 0.3s;
    }
    #status.found { background: rgba(0,160,60,0.9); }
  </style>

  <!-- A-Frame 1.3.0 + AR.js 3.3.3 — proven stable combination -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ar.js@2.2.2/aframe/build/aframe-ar.js"></script>
</head>
<body>

<div id="ui">
  <button class="btn active"   id="btnTorus" onclick="showSurface('torus')">Astroidal Torus</button>
  <button class="btn inactive" id="btnShoe"  onclick="showSurface('shoe')">Shoe Surface</button>
</div>
<div id="status">Loading…</div>

<a-scene
  embedded
  arjs="sourceType: webcam;
        debugUIEnabled: false;
        detectionMode: mono;
        patternRatio: 0.50;
        maxDetectionRate: 60;"
  renderer="antialias: true;"
  vr-mode-ui="enabled: false"
>
  <a-assets></a-assets>

  <a-light type="ambient"     color="#fff" intensity="0.7"></a-light>
  <a-light type="directional" color="#fff" intensity="1.0" position="5 10 5"></a-light>

  <a-marker
    type="pattern"
    url="pattern-astroidaltorus.patt"
    id="marker"
    smooth="true"
    smoothCount="5"
    smoothTolerance="0.05"
    emitevents="true"
  >
    <!-- Astroidal Torus: (R + r*cos³v)*cos(u), (R + r*cos³v)*sin(u), r*sin³(v) -->
    <a-entity id="torusEntity"
      position="0 0.5 0"
      surface-geometry="type: torus"
      animation="property: rotation; to: 360 0 0; loop: true; dur: 5000; easing: linear">
    </a-entity>

    <!-- Shoe Surface / Enneper: u-u³/3+uv², v-v³/3+vu², u²-v² -->
    <a-entity id="shoeEntity"
      position="0 0.5 0"
      surface-geometry="type: shoe"
      visible="false"
      animation="property: rotation; to: 360 0 0; loop: true; dur: 5000; easing: linear">
    </a-entity>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
'use strict';

AFRAME.registerComponent('surface-geometry', {
  schema: { type: { type: 'string', default: 'torus' } },

  init: function () {
    const type  = this.data.type;
    const geo   = (type === 'torus') ? this.buildTorus() : this.buildShoe();
    const color = (type === 'torus') ? 0x2277ff : 0xff4444;

    const solid = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({
      color,
      specular: 0xffffff,
      shininess: 90,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.88
    }));

    const wire = new THREE.LineSegments(
      new THREE.WireframeGeometry(geo),
      new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.22 })
    );

    this.el.setObject3D('solid', solid);
    this.el.setObject3D('wire',  wire);
  },

  // ── Astroidal Torus ─────────────────────────────────────────────────────
  // x = (R + r·cos³(v)) · cos(u)
  // y = (R + r·cos³(v)) · sin(u)
  // z = r · sin³(v)
  buildTorus: function () {
    const R = 1.0, r = 0.38;
    const UN = 80, VN = 80;
    const pos = [], idx = [];

    for (let i = 0; i <= UN; i++) {
      const u  = (i / UN) * 2 * Math.PI;
      const cu = Math.cos(u), su = Math.sin(u);
      for (let j = 0; j <= VN; j++) {
        const v  = (j / VN) * 2 * Math.PI;
        const cv = Math.cos(v), sv = Math.sin(v);
        const rho = R + r * cv * cv * cv;
        pos.push(rho * cu,  rho * su,  r * sv * sv * sv);
      }
    }
    for (let i = 0; i < UN; i++) {
      for (let j = 0; j < VN; j++) {
        const a = i*(VN+1)+j, b = a+1, c = (i+1)*(VN+1)+j, d = c+1;
        idx.push(a, b, c,  b, d, c);
      }
    }

    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    g.setIndex(idx);
    g.computeVertexNormals();
    return g;
  },

  // ── Shoe Surface (Enneper minimal surface) ──────────────────────────────
  // x = u - u³/3 + u·v²
  // y = v - v³/3 + v·u²
  // z = u² - v²
  buildShoe: function () {
    const UN = 80, VN = 80;
    const LO = -1.3, HI = 1.3, S = 0.42;
    const pos = [], idx = [];

    for (let i = 0; i <= UN; i++) {
      const u = LO + (i / UN) * (HI - LO);
      for (let j = 0; j <= VN; j++) {
        const v = LO + (j / VN) * (HI - LO);
        pos.push(
          S * (u - u*u*u/3 + u*v*v),
          S * (v - v*v*v/3 + v*u*u),
          S * (u*u - v*v)
        );
      }
    }
    for (let i = 0; i < UN; i++) {
      for (let j = 0; j < VN; j++) {
        const a = i*(VN+1)+j, b = a+1, c = (i+1)*(VN+1)+j, d = c+1;
        idx.push(a, b, c,  b, d, c);
      }
    }

    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    g.setIndex(idx);
    g.computeVertexNormals();
    return g;
  }
});

// ── Status bar ──────────────────────────────────────────────────────────────
const statusEl = document.getElementById('status');

document.querySelector('a-scene').addEventListener('loaded', () => {
  statusEl.textContent = 'Point camera at the printed marker ↓';
});

const marker = document.getElementById('marker');
marker.addEventListener('markerFound', () => {
  statusEl.textContent  = '✓ Marker detected!';
  statusEl.className    = 'found';
});
marker.addEventListener('markerLost', () => {
  statusEl.textContent  = 'Point camera at the printed marker ↓';
  statusEl.className    = '';
});

// ── Toggle surfaces ─────────────────────────────────────────────────────────
function showSurface(type) {
  document.getElementById('torusEntity').setAttribute('visible', type === 'torus');
  document.getElementById('shoeEntity').setAttribute('visible',  type === 'shoe');
  document.getElementById('btnTorus').className = 'btn ' + (type === 'torus' ? 'active' : 'inactive');
  document.getElementById('btnShoe').className  = 'btn ' + (type === 'shoe'  ? 'active' : 'inactive');
}
</script>
</body>
</html>
