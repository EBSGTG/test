<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Anaglyphic Stereo Rendering - 3D Shoe Model</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #F8F8FF;
        color: #4B0082;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        min-height: 100vh;
      }

      .container {
        max-width: 1200px; width: 100%;
        background: #FFFFFF;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(123,104,238,0.15);
        overflow: hidden;
      }

      .header {
        background: linear-gradient(135deg, #FFB6C1 0%, #E6E6FA 100%);
        padding: 30px; text-align: center;
        border-bottom: 3px solid #ADD8E6;
      }
      .header h2 { color: #FF69B4; margin-bottom: 10px; font-size: 2.5em; text-shadow: 1px 1px 2px rgba(255,105,180,0.4); }
      .header p  { color: #7B68EE; font-size: 1.1em; opacity: 0.9; font-style: italic; }

      .main-content { display: flex; flex-direction: column; align-items: center; padding: 30px; }

      #canvas-holder {
        border: 3px solid #ADD8E6;
        box-shadow: 0 4px 15px rgba(123,104,238,0.2);
        border-radius: 10px; overflow: hidden;
        background-color: #FFFFFF;
        transition: box-shadow 0.3s ease;
        margin-bottom: 20px;
      }
      #canvas-holder:hover { box-shadow: 0 4px 20px rgba(255,105,180,0.5); }

      #webglcanvas { display: block; width: 800px; height: 600px; cursor: grab; }
      #webglcanvas:active { cursor: grabbing; }

      /* ── TUI panel – matches stereo camera style ── */
      .tui-panel {
        background: #F0F8FF;
        border-radius: 15px;
        padding: 25px;
        width: 100%; margin-bottom: 20px;
        box-shadow: 0 5px 15px rgba(123,104,238,0.1);
        border: 2px dashed #ADD8E6;
      }
      .tui-panel-header {
        display: flex; align-items: center; gap: 14px;
        margin-bottom: 20px; padding-bottom: 14px;
        border-bottom: 2px solid #ADD8E6;
      }
      .tui-icon {
        width: 42px; height: 42px; border-radius: 10px;
        background: #E6E6FA; border: 1px solid #ADD8E6;
        display: flex; align-items: center; justify-content: center;
        color: #FF69B4; flex-shrink: 0;
      }
      .tui-title { color: #FF69B4; font-size: 1.5em; font-weight: 700; }
      .tui-subtitle { color: #7B68EE; font-size: 0.85em; margin-top: 2px; opacity: 0.85; }

      .tui-status-badge {
        margin-left: auto; display: flex; align-items: center; gap: 7px;
        background: #FFFFFF; border: 1px solid #E6E6FA;
        padding: 5px 14px; border-radius: 20px;
        font-size: 0.85em; color: #7B68EE;
        box-shadow: 0 2px 6px rgba(123,104,238,0.08);
      }
      .tui-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: #ADD8E6; display: inline-block;
        transition: background 0.3s, box-shadow 0.3s;
      }
      .tui-dot.connected  { background: #22c55e; box-shadow: 0 0 5px #22c55e88; }
      .tui-dot.error      { background: #ef4444; box-shadow: 0 0 5px #ef444488; }
      .tui-dot.connecting { background: #f59e0b; box-shadow: 0 0 5px #f59e0b88; }

      .tui-body { }

      .tui-field-group {
        display: flex; align-items: flex-end; gap: 12px;
        flex-wrap: wrap; margin-bottom: 20px;
      }
      .tui-field { display: flex; flex-direction: column; gap: 6px; }
      .tui-field-label {
        color: #4B0082; font-size: 0.78em; font-weight: 600;
        text-transform: uppercase; letter-spacing: 0.06em;
      }
      .tui-field input[type="text"],
      .tui-field input[type="number"] {
        background: #FFFFFF; border: 1px solid #E6E6FA;
        color: #4B0082; padding: 8px 12px;
        border-radius: 10px; font-size: 14px;
        outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        box-shadow: 0 2px 6px rgba(123,104,238,0.07);
      }
      .tui-field input:focus {
        border-color: #7B68EE;
        box-shadow: 0 0 0 3px rgba(123,104,238,0.12);
      }
      .tui-field input[type="text"]   { width: 168px; }
      .tui-field input[type="number"] { width: 90px; }

      .tui-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
      .tui-btn {
        display: flex; align-items: center; gap: 6px;
        padding: 9px 18px; border: none; border-radius: 10px;
        cursor: pointer; font-weight: 700; font-size: 13px;
        transition: transform 0.1s, box-shadow 0.2s;
        box-shadow: 0 2px 8px rgba(255,105,180,0.15);
      }
      .tui-btn:hover  { box-shadow: 0 4px 14px rgba(255,105,180,0.3); }
      .tui-btn:active { transform: scale(0.97); }
      .btn-connect    { background: #FF69B4; color: #fff; }
      .btn-disconnect { background: #E6E6FA; color: #7B68EE; }
      .btn-reset      { background: #FFFFFF; color: #4B0082; border: 1px solid #E6E6FA; box-shadow: none; }

      #wsStatus { color: #7B68EE; font-size: 13px; }

      .tui-info-cards {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
        gap: 12px;
      }
      .tui-card {
        display: flex; align-items: flex-start; gap: 12px;
        background: #FFFFFF; border: 1px solid #E6E6FA;
        border-radius: 10px; padding: 13px 15px;
        font-size: 12px; color: #4B0082; line-height: 1.6;
        box-shadow: 0 2px 8px rgba(123,104,238,0.06);
      }
      .tui-card strong { color: #FF69B4; }
      .tui-card-num {
        min-width: 22px; height: 22px;
        background: #E6E6FA; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 11px; font-weight: 700;
        color: #7B68EE; flex-shrink: 0; margin-top: 1px;
      }
      .tui-card-warn { border-color: #fde68a; background: #fffbeb; }
      .tui-card-warn .tui-card-num { background: #fef3c7; color: #d97706; }
      .tui-card-warn { color: #92400e; }
      .tui-card-warn strong { color: #d97706; }

      /* ── Stereo controls ── */
      .controls-panel {
        background: #F0F8FF; border-radius: 15px;
        padding: 25px; width: 100%;
        box-shadow: 0 5px 15px rgba(123,104,238,0.1);
        border: 2px dashed #ADD8E6;
      }
      .panel-title {
        color: #FF69B4; font-size: 1.5em;
        margin-bottom: 20px; padding-bottom: 10px;
        border-bottom: 2px solid #ADD8E6;
      }
      .control-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px,1fr)); gap: 20px; }

      .control-item {
        background: #FFFFFF; padding: 15px; border-radius: 10px;
        box-shadow: 0 2px 10px rgba(255,105,180,0.1);
        border: 1px solid #E6E6FA;
      }
      .control-label {
        display: flex; justify-content: space-between; align-items: center;
        margin-bottom: 10px; color: #4B0082; font-weight: 500;
      }
      .value-badge {
        background: #E6E6FA; color: #7B68EE;
        padding: 3px 10px; border-radius: 20px;
        font-size: 0.9em; font-weight: 600; border: 1px solid #ADD8E6;
      }

      input[type="range"] {
        width: 100%; height: 8px; border-radius: 5px;
        background: #E6E6FA; outline: none; -webkit-appearance: none;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none; width: 20px; height: 20px;
        background: #FF69B4; border-radius: 50%; cursor: pointer;
        box-shadow: 0 2px 5px rgba(255,105,180,0.3);
        transition: transform 0.2s; border: 2px solid #FFFFFF;
      }
      input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); background: #FF1493; }

      @media (max-width: 900px) {
        #webglcanvas { width: 100%; height: auto; }
        .control-grid { grid-template-columns: 1fr; }
      }
    </style>

    <script src="./Utils/trackball-rotator.js"></script>
    <script src="./Utils/m4.js"></script>
    <script src="./StereoCamera.js"></script>
    <script src="./Texture.js"></script>
    <script src="./shader.gpu"></script>
    <script src="./Model.js"></script>
    <script src="./main.js"></script>
  </head>
  <body onload="init()">
    <div class="container">

      <div class="header">
        <h2>3D Shoe Anaglyphic Stereo Rendering</h2>
        <p>Experience depth with red-cyan glasses · Drag to rotate · Webcam background · Phone tilt control</p>
      </div>

      <div class="main-content">

        <div id="canvas-holder">
          <canvas width="800" height="600" id="webglcanvas"></canvas>
        </div>

        <!-- ══ TUI: Sensor Server (accelerometer) ══ -->
        <div class="tui-panel">
          <div class="tui-panel-header">
            <div class="tui-icon">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18.5" stroke-width="3"/>
                <path d="M9 7 l3-3 l3 3M9 11 l3 3 l3-3" stroke-linecap="round"/>
              </svg>
            </div>
            <div>
              <div class="tui-title">Phone Tilt Control</div>
              <div class="tui-subtitle">Hardware accelerometer · Sensor Server WebSocket</div>
            </div>
            <div class="tui-status-badge">
              <span class="tui-dot" id="wsDot"></span>
              <span id="wsStatus">Disconnected</span>
            </div>
          </div>

          <div class="tui-body">
            <div class="tui-field-group">
              <div class="tui-field">
                <span class="tui-field-label">Phone IP</span>
                <input type="text" id="wsIp" placeholder="1.2.3.4" value="1.2.3.4" />
              </div>
              <div class="tui-field">
                <span class="tui-field-label">Port</span>
                <input type="number" id="wsPort" placeholder="8080" value="8080" />
              </div>
              <div class="tui-actions">
                <button class="tui-btn btn-connect" onclick="connectWebSocket(
                    document.getElementById('wsIp').value.trim(),
                    document.getElementById('wsPort').value.trim())">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
                  Connect
                </button>
                <button class="tui-btn btn-disconnect" onclick="if(ws){ws.close();}">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  Disconnect
                </button>
                <button class="tui-btn btn-reset" onclick="orientationMatrix=null;updateWsStatus('Disconnected','#8b9cb8');">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                  Use Trackball
                </button>
              </div>
            </div>

    
          </div>
        </div>

        <!-- ══ Stereo camera controls ══ -->
        <div class="controls-panel">
          <div class="panel-title">Stereo Camera Controls</div>
          <div class="control-grid">

            <div class="control-item">
              <div class="control-label">
                <label>Eye Separation</label>
                <span class="value-badge" id="eyeSepValue">0.7</span>
              </div>
              <input type="range" id="eyeSeparation" min="0.1" max="2.0" step="0.1" value="0.7"
                     oninput="updateEyeSepValue(this.value); updateParameters();">
            </div>

            <div class="control-item">
              <div class="control-label">
                <label>Field of View</label>
                <span class="value-badge" id="fovValue">0.4</span>
              </div>
              <input type="range" id="fov" min="0.1" max="1.0" step="0.05" value="0.4"
                     oninput="updateFovValue(this.value); updateParameters();">
            </div>

            <div class="control-item">
              <div class="control-label">
                <label>Near Clipping</label>
                <span class="value-badge" id="nearValue">8.0</span>
              </div>
              <input type="range" id="nearClipping" min="1.0" max="10.0" step="0.5" value="8.0"
                     oninput="updateNearValue(this.value); updateParameters();">
            </div>

            <div class="control-item">
              <div class="control-label">
                <label>Convergence Distance</label>
                <span class="value-badge" id="convValue">14.0</span>
              </div>
              <input type="range" id="convergence" min="10.0" max="20.0" step="0.5" value="14.0"
                     oninput="updateConvValue(this.value); updateParameters();">
            </div>

          </div>
        </div>

      </div>
    </div>

    <script>
      function updateEyeSepValue(v){ document.getElementById("eyeSepValue").textContent = parseFloat(v).toFixed(1); }
      function updateFovValue(v)   { document.getElementById("fovValue").textContent    = parseFloat(v).toFixed(2); }
      function updateNearValue(v)  { document.getElementById("nearValue").textContent   = parseFloat(v).toFixed(1); }
      function updateConvValue(v)  { document.getElementById("convValue").textContent   = parseFloat(v).toFixed(1); }

      // Override updateWsStatus from main.js to also update the dot
      function updateWsStatus(text, color) {
        const el  = document.getElementById('wsStatus');
        const dot = document.getElementById('wsDot');
        if (el)  { el.textContent = text; el.style.color = color; }
        if (dot) {
          dot.className = 'tui-dot';
          if (color === '#4cff72') dot.classList.add('connected');
          else if (color === '#ff4c4c') dot.classList.add('error');
          else if (color === '#fdbb2d') dot.classList.add('connecting');
        }
      }
    </script>
  </body>
</html>
