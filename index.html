<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR – Astroidal Torus & Shoe Surface</title>
  <style>
    body { margin:0; padding:0; overflow:hidden; font-family:Arial,sans-serif; }
    .control-panel {
      position:absolute; bottom:0; left:0; right:0;
      background:rgba(0,0,0,0.75); color:#fff;
      padding:10px; display:flex; flex-direction:column; z-index:9999;
    }
    .control-row { display:flex; justify-content:center; margin:4px 0; flex-wrap:wrap; gap:5px; }
    .btn {
      background:#4CAF50; color:#fff; border:none; border-radius:5px;
      padding:8px 12px; font-weight:bold; cursor:pointer;
      min-width:75px; font-size:13px; -webkit-tap-highlight-color:transparent;
    }
    .btn.active  { background:#ff7f00; }
    .btn.red     { background:#cc2200; }
    .btn.blue    { background:#0055cc; }
    .info-panel {
      position:absolute; top:0; left:0; right:0;
      background:rgba(0,0,0,0.65); color:#fff;
      padding:10px 14px; z-index:9999; font-size:14px;
      text-align:center; transition:background 0.3s;
    }
    @media(max-width:600px){ .btn{padding:6px 8px;min-width:60px;font-size:12px;} }
  </style>

  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.3.3/aframe/build/aframe-ar.js"></script>

  </div>
  <div class="control-row">
    <button class="btn active"  id="btn-axis">Вісь: Y</button>

    <button class="btn blue"    id="btn-marker">Маркер: МІЙ</button>
  </div>
</div>

<div id="ar-root"></div>

 165 248 255 255 255 255 230 189 251 251 135 255\n255 159 234 255 239 107 255 255 255 254 101 247 255 210 177 255\n255 242 122 254 255 220 108 248 242  99 233 255 250 127 250 255\n255 255 217 133 254 255 237 167 182 243 255 253 121 231 255 255\n255 255 255 206 131 253 255 233 249 255 250 121 221 255 255 255\n255 255 255 255 219 123 225 233 249 212 125 232 255 255 255 255\n255 255 255 255 255 245 167 128 135 177 250 255 255 255 255 255\n255 255 255 255 255 255 255 255 255 255 255 255 255 255 255 255\n";

// All ratios to try
const RATIOS  = [0.50, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85];
let ratioIdx  = 0;
let useHiro   = false;   // toggle between custom and Hiro marker

/* ── Build / rebuild entire a-scene ────────────────────────────────── */
function buildScene() {
  const ratio   = RATIOS[ratioIdx];
  const pattURL = URL.createObjectURL(new Blob([PATT_DATA], {type:'text/plain'}));

  document.getElementById('ar-root').innerHTML = '';   // destroy old scene

  const markerAttr = useHiro
    ? `preset="hiro"`
    : `type="pattern" url="${pattURL}"`;

  document.getElementById('ar-root').innerHTML = `
<a-scene embedded vr-mode-ui="enabled:false"
  arjs="sourceType:webcam; debugUIEnabled:false; detectionMode:mono; patternRatio:${ratio}; maxDetectionRate:60;"
  renderer="antialias:true;" id="arscene">

  <a-light type="ambient"     color="#fff" intensity="0.7"></a-light>
  <a-light type="directional" color="#fff" intensity="1.1" position="5 10 5"></a-light>

  <a-marker ${markerAttr}
    id="marker" smooth="true" smoothCount="5" smoothTolerance="0.05" emitevents="true">

    <a-entity id="surface" position="0 0.5 0"
      surface-geometry="type:torus"
      multi-axis-rotation="enabled:true; speed:0.3; mode:y">
    </a-entity>

  </a-marker>
  <a-entity camera></a-entity>
</a-scene>`;

  // Update UI labels
  document.getElementById('btn-ratio').textContent  = 'ratio: ' + ratio;
  document.getElementById('btn-marker').textContent = useHiro ? 'Маркер: HIRO' : 'Маркер: МІЙ';
  document.getElementById('info').textContent       = 'Шукаю маркер… ratio=' + ratio + (useHiro ? ' [HIRO]' : '');
  document.getElementById('info').style.background  = 'rgba(0,0,0,0.65)';

  setTimeout(wireMarker, 1000);
}

function wireMarker() {
  const marker = document.getElementById('marker');
  const info   = document.getElementById('info');
  if (!marker) { setTimeout(wireMarker, 300); return; }
  marker.addEventListener('markerFound', () => {
    info.textContent = '✅ ЗНАЙДЕНО! ratio=' + RATIOS[ratioIdx] + (useHiro ? ' [HIRO]' : '');
    info.style.background = 'rgba(0,150,0,0.85)';
  });
  marker.addEventListener('markerLost', () => {
    info.textContent = 'Шукаю маркер… ratio=' + RATIOS[ratioIdx] + (useHiro ? ' [HIRO]' : '');
    info.style.background = 'rgba(0,0,0,0.65)';
  });
  initButtons();
}

/* ── A-Frame components ─────────────────────────────────────────────── */
AFRAME.registerComponent('surface-geometry', {
  schema: { type:{type:'string', default:'torus'} },
  init:   function(){ this._color='#2277ff'; this._wire=false; this._build(); },
  update: function(old){ if(old.type!==this.data.type) this._build(); },

  _build: function(){
    const geo = this.data.type==='torus' ? this._torus() : this._shoe();
    const mat = new THREE.MeshPhongMaterial({
      color:this._color, specular:0xffffff, shininess:80,
      side:THREE.DoubleSide, transparent:true, opacity:0.9,
      wireframe:this._wire
    });
    this.mesh = new THREE.Mesh(geo, mat);
    this.el.setObject3D('mesh', this.mesh);
  },

  setColor:     function(c){ this._color=c; if(this.mesh) this.mesh.material.color.set(c); },
  setWireframe: function(v){ this._wire=v;  if(this.mesh) this.mesh.material.wireframe=v;  },

  /* Astroidal Torus: x=(R+r·cos³v)·cosu, y=(R+r·cos³v)·sinu, z=r·sin³v */
  _torus: function(){
    const R=1.0,r=0.38,UN=72,VN=72,pos=[],idx=[];
    for(let i=0;i<=UN;i++){
      const u=(i/UN)*2*Math.PI,cu=Math.cos(u),su=Math.sin(u);
      for(let j=0;j<=VN;j++){
        const v=(j/VN)*2*Math.PI,cv=Math.cos(v),sv=Math.sin(v);
        const rho=R+r*cv*cv*cv;
        pos.push(rho*cu,rho*su,r*sv*sv*sv);
      }
    }
    for(let i=0;i<UN;i++) for(let j=0;j<VN;j++){
      const a=i*(VN+1)+j,b=a+1,c=(i+1)*(VN+1)+j,d=c+1;
      idx.push(a,b,c,b,d,c);
    }
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
    g.setIndex(idx); g.computeVertexNormals(); return g;
  },

  /* Shoe/Enneper: x=u-u³/3+uv², y=v-v³/3+vu², z=u²-v² */
  _shoe: function(){
    const UN=72,VN=72,S=0.42,LO=-1.3,HI=1.3,pos=[],idx=[];
    for(let i=0;i<=UN;i++){
      const u=LO+(i/UN)*(HI-LO);
      for(let j=0;j<=VN;j++){
        const v=LO+(j/VN)*(HI-LO);
        pos.push(S*(u-u*u*u/3+u*v*v),S*(v-v*v*v/3+v*u*u),S*(u*u-v*v));
      }
    }
    for(let i=0;i<UN;i++) for(let j=0;j<VN;j++){
      const a=i*(VN+1)+j,b=a+1,c=(i+1)*(VN+1)+j,d=c+1;
      idx.push(a,b,c,b,d,c);
    }
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
    g.setIndex(idx); g.computeVertexNormals(); return g;
  }
});

AFRAME.registerComponent('multi-axis-rotation', {
  schema:{
    enabled:{type:'boolean',default:true},
    speed:{type:'number',default:0.3},
    mode:{type:'string',default:'y'}
  },
  init:function(){this.rx=0;this.ry=0;this.rz=0;},
  tick:function(t,dt){
    if(!this.data.enabled)return;
    const s=this.data.speed*(dt/1000),m=this.data.mode;
    if(m.includes('x'))this.rx+=s;
    if(m.includes('y'))this.ry+=s;
    if(m.includes('z'))this.rz+=s;
    this.el.object3D.rotation.set(this.rx,this.ry,this.rz);
  }
});

/* ── UI buttons — re-wired after each scene rebuild ─────────────────── */
let buttonsInited = false;
function initButtons(){
  if(buttonsInited) return;
  buttonsInited = true;

  /* ratio — rebuild scene */
  document.getElementById('btn-ratio').onclick = function(){
    ratioIdx = (ratioIdx+1) % RATIOS.length;
    buttonsInited = false;
    buildScene();
  };

  /* marker type — rebuild scene */
  document.getElementById('btn-marker').onclick = function(){
    useHiro = !useHiro;
    buttonsInited = false;
    buildScene();
  };

  /* Surface */
  const surfs=[{type:'torus',label:'Тор',color:'#2277ff'},{type:'shoe',label:'Shoe',color:'#ff4444'}];
  let sIdx=0;
  document.getElementById('btn-surface').onclick = function(){
    sIdx=(sIdx+1)%surfs.length;
    const se=document.getElementById('surface');
    se.setAttribute('surface-geometry','type',surfs[sIdx].type);
    setTimeout(()=>{ if(se.components['surface-geometry']) se.components['surface-geometry']._color=surfs[sIdx].color; },300);
    this.textContent=surfs[sIdx].label;
  };

  /* Wireframe */
  let wireOn=false;
  document.getElementById('btn-wireframe').onclick = function(){
    wireOn=!wireOn;
    const comp=document.getElementById('surface').components['surface-geometry'];
    if(comp) comp.setWireframe(wireOn);
    this.textContent=wireOn?'Каркас: Вкл':'Каркас: Вим';
    this.classList.toggle('active',wireOn);
  };

  /* Color */
  const colors=['#2277ff','#ff4444','#44cc44','#ffcc00','#ff44ff','#00cccc'];
  let cIdx=0;
  document.getElementById('btn-color').onclick = function(){
    cIdx=(cIdx+1)%colors.length;
    const comp=document.getElementById('surface').components['surface-geometry'];
    if(comp) comp.setColor(colors[cIdx]);
    this.style.background=colors[cIdx];
  };

  /* Axis */
  const axes=[{m:'y',l:'Y'},{m:'x',l:'X'},{m:'z',l:'Z'},{m:'xy',l:'XY'},{m:'xz',l:'XZ'},{m:'yz',l:'YZ'},{m:'xyz',l:'XYZ'}];
  let aIdx=0;
  document.getElementById('btn-axis').onclick = function(){
    aIdx=(aIdx+1)%axes.length;
    document.getElementById('surface').setAttribute('multi-axis-rotation','mode',axes[aIdx].m);
    this.textContent='Вісь: '+axes[aIdx].l;
  };

  /* Size */
  const sizes=[1.0,0.6,1.4,0.35];
  let szIdx=0;
  document.getElementById('btn-size').onclick = function(){
    szIdx=(szIdx+1)%sizes.length;
    const s=sizes[szIdx];
    document.getElementById('surface').setAttribute('scale',s+' '+s+' '+s);
    this.textContent='Розмір: '+s;
  };

  /* Speed */
  const speeds=[0.3,0.1,0.6,1.0];
  let spIdx=0, running=true;
  const btnSp=document.getElementById('btn-speed');
  btnSp.onclick=function(){
    spIdx=(spIdx+1)%speeds.length;
    document.getElementById('surface').setAttribute('multi-axis-rotation','speed',speeds[spIdx]);
    this.textContent='Швид: '+speeds[spIdx].toFixed(1);
  };
  btnSp.ondblclick=function(e){
    e.preventDefault(); running=!running;
    document.getElementById('surface').setAttribute('multi-axis-rotation','enabled',running);
    this.textContent=running?'Швид: '+speeds[spIdx].toFixed(1):'Стоп';
    this.classList.toggle('active',running);
  };
}

/* ── Start ──────────────────────────────────────────────────────────── */
buildScene();
</script>
